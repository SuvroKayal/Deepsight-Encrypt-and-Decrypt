<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Deepsight | Secure Workspace</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="CSS/style.css">
  <link rel="icon" type="image/png" href="Attachments/logo.png">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  
  <script src="JS/app.js" defer></script>
</head>
<body>

  <div id="page-landing" class="page active">
    <div id="canvas-container"></div>
    
    <div class="landing-overlay">
      <div class="landing-content">
        <h1>Deepsight</h1>
        <p>DeepSight provides a fast, secure, and intuitive environment for encryption, decryption, and advanced text transformation.</p>
        <button class="enter-btn" onclick="navigateTo('app')">
          Enter <span class="arrow">→</span>
        </button>
      </div>
    </div>
  </div>

  <div id="page-app" class="page">
    <div class="app-workspace">
      
      <header class="workspace-header">
        <button class="icon-btn" onclick="navigateTo('landing')" title="Back to Ocean">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
        </button>
        <div class="mode-toggle">
          <button class="toggle-btn active" id="btn-enc" onclick="setMode('encrypt')">Encrypt</button>
          <button class="toggle-btn" id="btn-dec" onclick="setMode('decrypt')">Decrypt</button>
        </div>
        <div style="width: 40px;"></div> 
      </header>

      <div class="chat-window" id="chat-history">
        <div class="chat-message system">
          <div class="bubble">Workspace initialized. How can I assist you today?</div>
        </div>
      </div>

      <div class="input-container">
        
        <div class="action-menu-wrapper">
          <button class="plus-btn" onclick="toggleMenu(event)">+</button>
          
          <div class="popup-menu" id="agent-menu">
            <div class="menu-item has-submenu" onclick="toggleSubmenu(event)">
              Friends <span>▸</span>
              <div class="submenu" id="friends-submenu">
                <div class="menu-item" onclick="selectAgent('Vikram')">Vikram</div>
                <div class="menu-item" onclick="selectAgent('Darpan')">Darpan</div>
                <div class="menu-item" onclick="selectAgent('Suvro')">Suvro</div>
              </div>
            </div>
          </div>
        </div>

        <textarea id="chat-input" placeholder="Initiate sequence..."></textarea>
        
        <button class="send-btn" onclick="processMessage()">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M2,21L23,12L2,3V10L17,12L2,14V21Z" /></svg>
        </button>
      </div>

    </div>
  </div>

</body>
</html>
